<aside class="sidebar">
  <div class="sidebar-brand">
    @if (!collapsed) {
      <span class="sidebar-brand-name">Finma</span>
    }
    <button class="sidebar-toggle" (click)="toggle()" [title]="collapsed ? 'Expandir' : 'Colapsar'">
      <i class="pi" [class.pi-angle-double-left]="!collapsed" [class.pi-angle-double-right]="collapsed"></i>
    </button>
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems; track item.path) {
      <a
        class="sidebar-link"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        [title]="collapsed ? item.title : ''"
      >
        <i class="pi {{ item.icon }}"></i>
        @if (!collapsed) {
          <span>{{ item.title }}</span>
        }
      </a>
    }
  </nav>
</aside>
