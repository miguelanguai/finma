<p-toast />
<p-confirmdialog />

<div class="buttons">
    <p-button (click)="showObjetivoDialog()" label="Crear Objetivo" />
    <p-selectbutton [options]="filtroOpciones" [(ngModel)]="filtroCumplido" optionLabel="label" optionValue="value" />
</div>

<p-table [value]="objetivosFiltrados" [tableStyle]="{ 'min-width': '50rem' }" stripedRows [paginator]="true" [rows]="12" [rowsPerPageOptions]="[12, 24, 60]">
    <ng-template #header>
        <tr>
            <th pSortableColumn="nombre">Nombre</th>
            <th pSortableColumn="monto">Monto</th>
            <th pSortableColumn="prioridad">Prioridad</th>
            <th pSortableColumn="fecha">Fecha</th>
            <th>Cumplido</th>
            <th></th>
            <th></th>
        </tr>
    </ng-template>
    <ng-template #body let-objetivo>
        <tr>
            <td>{{ objetivo.nombre }}</td>
            <td>{{ objetivo.monto | number:'1.2-2' }} €</td>
            <td>{{ objetivo.prioridad }}</td>
            <td>{{ objetivo.fecha | date:'dd/MM/yyyy' }}</td>
            <td>{{ objetivo.is_cumplido ? 'Sí' : 'No' }}</td>
            <td>
                <p-button icon="pi pi-pencil" severity="info" (click)="showObjetivoDialog(objetivo)" label="Editar" />
            </td>
            <td>
                <p-button icon="pi pi-trash" severity="danger" (click)="showDeleteObjetivoDialog(objetivo)" label="Borrar" />
            </td>
        </tr>
    </ng-template>
</p-table>
