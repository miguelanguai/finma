<div class="landing-page">

    <!-- Cabecera -->
    <div class="landing-cabecera">
        <h1 class="landing-titulo">Finma</h1>
        @if (resumen?.periodo_activo) {
            <span class="periodo-badge">{{ resumen!.periodo_activo!.nombre }}</span>
        }
    </div>

    <!-- Error -->
    @if (error) {
        <div class="landing-error">
            <i class="pi pi-exclamation-triangle"></i>
            No se pudieron cargar los datos. Comprueba la conexión con el servidor.
        </div>
    }

    <!-- KPIs -->
    @if (resumen) {
        <app-kpi-landing
            [balance]="resumen.balance_periodo"
            [gasto]="resumen.total_gasto_periodo"
            [ingreso]="resumen.total_ingreso_periodo"
            [numMovimientos]="resumen.num_movimientos"
        />
    }

    <!-- Últimos movimientos -->
    @if (resumen) {
        <section class="landing-section">
            <app-ultimos-movimientos [movimientos]="resumen.ultimos_movimientos" />
        </section>
    }

    <!-- Objetivos -->
    @if (resumen) {
        <section class="landing-section">
            <app-objetivos-resumen [objetivos]="resumen.objetivos_progreso" />
        </section>
    }

    <!-- Balance general -->
    @if (resumen) {
        <section class="landing-section">
            <app-balance-general
                [gasto]="resumen.total_gasto_periodo"
                [ingreso]="resumen.total_ingreso_periodo"
                [balance]="resumen.balance_periodo"
            />
        </section>
    }

    <!-- Movimientos por categoría -->
    @if (resumen) {
        <section class="landing-section">
            <app-movimientos-categoria
                [gastosPeriodo]="resumen.gastos_por_categoria"
                [anio]="anioActual"
                [nombrePeriodo]="resumen.periodo_activo?.nombre ?? 'Período activo'"
            />
        </section>
    }

    <!-- Accesos rápidos -->
    <section class="landing-section">
        <app-accesos-rapidos />
    </section>

</div>
